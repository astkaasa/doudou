<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>空豆霸业</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>
<div id="app">
  <div id="hud">
    <div id="hud-company">
      <span class="hud-company-icon">✈</span>
      <span id="hud-company-name">豆豆航空</span>
      <span id="hud-trait-badge" hidden></span>
    </div>
    <button class="hud-item hud-company-value" id="hud-cv-badge" type="button" data-action="open-company-value" hidden><span class="hud-label">市值</span><span class="hud-val">$0M</span></button>
    <div class="hud-item hud-cash-wrap"><span class="hud-label">资金</span><span class="hud-val" id="hud-cash">$0M</span></div>
    <div class="hud-item hud-profit-wrap"><span class="hud-label">上季利润</span><span class="hud-val" id="hud-profit">$0M</span></div>
    <div class="hud-item hud-routes-wrap"><span class="hud-label">航线</span><span class="hud-val" id="hud-routes">0</span></div>
    <div class="hud-item hud-fleet-wrap"><span class="hud-label">机队</span><span class="hud-val" id="hud-fleet">购0/租0</span></div>
    <div class="hud-item hud-load-wrap"><span class="hud-label">客座率</span><span class="hud-val" id="hud-load">0%</span></div>
    <div class="hud-item hud-ops-wrap"><span class="hud-label">运营效能</span><span class="hud-val" id="hud-ops-eff">--</span></div>
    <div class="hud-item hud-hq"><span class="hud-label">总部</span><span class="hud-val" id="hud-hq">未定</span></div>
    <div id="hud-brand"><span class="hud-label">品牌</span><span class="hud-val" id="hud-brand-val">★</span></div>
    <button id="hud-main-quest-btn" class="hud-main-quest-btn" type="button" data-action="open-main-quest" title="查看苍穹之路主线目标"><span>🛫 苍穹之路 🛬</span><strong id="hud-main-quest-stage">1</strong></button>
    <button class="hud-milestone-btn" type="button" data-action="open-milestones" title="查看里程碑"><span class="hud-milestone-label">里程碑</span><strong id="hud-milestones">0/30</strong></button>
    <div class="hud-item" id="hud-loan-wrap" hidden><span class="hud-label">贷款</span><span class="hud-val negative" id="hud-loan">$0M</span></div>
    <div id="mega-event-badge" hidden></div>
    <div id="hud-actions">
      <button class="btn btn-sm btn-secondary" type="button" data-action="save-game" title="保存存档">💾 <span class="hud-action-label">存档</span></button>
      <button class="btn btn-sm btn-secondary" type="button" data-action="load-game" title="载入存档">📂 <span class="hud-action-label">读档</span></button>
    </div>
    <div id="hud-turn">2020 Q1</div>
  </div>
  <div id="main">
    <div id="map-container"></div>
    <div id="panel">
      <div class="panel-section">
        <div class="panel-title">快捷操作</div>
        <div class="quick-action-grid">
          <button class="btn btn-primary btn-sm" type="button" id="btn-open-route" data-action="open-route-modal">开通航线</button>
          <button class="btn btn-primary btn-sm" type="button" id="btn-buy-plane" data-action="open-buy-plane-modal">购买飞机</button>
          <button class="btn btn-warning btn-sm" type="button" id="btn-fleet" data-action="open-fleet-panel">机队管理</button>
          <button class="btn btn-sm btn-secondary" type="button" id="btn-routes" data-action="open-route-list">航线管理</button>
          <button class="btn btn-sm btn-info" type="button" id="btn-ops" data-action="open-operations-panel">运营管理</button>
          <button class="btn btn-sm btn-warning" type="button" id="btn-loan" data-action="open-loan-modal">银行贷款</button>
          <button class="btn btn-sm btn-violet" type="button" id="btn-branch" data-action="open-branch-modal">分部管理</button>
          <button class="btn btn-sm btn-muted" type="button" id="btn-subsidiary" data-action="open-subsidiary-overview">投资管理</button>
          <button class="btn btn-sm btn-info" type="button" id="btn-airport-program" data-action="open-airport-program">机场经营</button>
        </div>
      </div>
      <div class="panel-section" id="panel-info">
        <div class="panel-title">航线概览</div>
        <div id="route-summary"></div>
      </div>
      <div class="panel-section">
        <div class="panel-title">市场动态</div>
        <div id="market-info"></div>
      </div>
      <div class="panel-section" id="panel-route-create" hidden>
        <div class="panel-title">航线开通</div>
        <div id="route-create-info"></div>
      </div>
    </div>
  </div>
  <div id="bottom">
    <span id="season-badge"></span>
    <span id="oil-badge"></span>
    <button id="nasdou-badge" type="button" data-action="open-stock-market" hidden>📈 NASDOU</button>
    <button id="reread-news-btn" type="button" data-action="show-newspaper" hidden>📰 上季报纸</button>
    <button id="reread-report-btn" type="button" data-action="show-report" hidden>📊 上季财报</button>
    <span id="bottom-hint" hidden></span>
    <span id="turn-forecast" hidden></span>
    <div id="zoom-controls">
      <span class="zoom-label">缩放</span>
      <button class="btn btn-sm map-zoom-btn active" type="button" data-action="set-map-zoom" data-zoom="1" id="zoom1">1x</button>
      <button class="btn btn-sm map-zoom-btn" type="button" data-action="set-map-zoom" data-zoom="1.5" id="zoom15">1.5x</button>
      <button class="btn btn-sm map-zoom-btn" type="button" data-action="set-map-zoom" data-zoom="2" id="zoom2">2x</button>
    </div>
    <button id="advance-btn" type="button" data-action="advance-turn">推进回合 ▶</button>
    <div id="bottom-tools">
      <button id="focus-hq-btn" type="button" data-action="focus-hq" title="定位总部" aria-label="定位总部">⌖</button>
      <button id="settings-btn" type="button" data-action="show-settings" title="设置" aria-label="设置">⚙</button>
      <button id="help-btn" type="button" data-action="show-onboarding-help" title="帮助与机制速查" aria-label="帮助与机制速查">?</button>
    </div>
  </div>
</div>
<div id="event-banner" class="event-banner event-banner-info" role="status" aria-live="polite" hidden></div>
<div id="modal-root"></div>
<div id="contract-zone"></div>
<div id="onboard-hint" hidden>
  <button class="hint-close" type="button" data-action="acknowledge-onboarding" title="暂时关闭" aria-label="暂时关闭新手引导">×</button>
  <div class="hint-title"></div>
  <div class="hint-body"></div>
  <div class="hint-footer">
    <div class="hint-step"></div>
    <button class="hint-skip" type="button" data-action="dismiss-onboarding">跳过引导</button>
  </div>
</div>
<div id="tutorial">
  <div id="menu-map-bg" aria-hidden="true"></div>
  <div class="menu-game-title">
    空豆霸业
    <span class="title-sub">SKYLINE TYCOON</span>
  </div>
  <div class="tutorial-box" id="menu-box"></div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
