<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>空豆霸业</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>
<div id="app">
  <div id="hud">
    <div id="hud-company">
      <span class="hud-company-icon">✈</span>
      <span id="hud-company-name">豆豆航空</span>
      <span id="hud-trait-badge" style="display:none"></span>
    </div>
    <div class="hud-item"><span class="hud-label">资金</span><span class="hud-val" id="hud-cash">$0M</span></div>
    <div class="hud-item"><span class="hud-label">上季利润</span><span class="hud-val" id="hud-profit">$0M</span></div>
    <div class="hud-item"><span class="hud-label">航线</span><span class="hud-val" id="hud-routes">0</span></div>
    <div class="hud-item"><span class="hud-label">机队</span><span class="hud-val" id="hud-fleet">购0/租0</span></div>
    <div class="hud-item"><span class="hud-label">客座率</span><span class="hud-val" id="hud-load">0%</span></div>
    <div class="hud-item hud-hq"><span class="hud-label">总部</span><span class="hud-val" id="hud-hq">未定</span></div>
    <div id="hud-brand"><span class="hud-label">品牌</span><span class="hud-val" id="hud-brand-val">★</span></div>
    <div class="hud-item" id="hud-loan-wrap" style="display:none"><span class="hud-label">贷款</span><span class="hud-val negative" id="hud-loan">$0M</span></div>
    <div id="hud-actions" style="display:flex;gap:4px;margin-left:8px">
      <button class="btn btn-sm" style="background:#334155;color:#e0e8f0" data-action="save-game" title="保存存档">💾 存档</button>
      <button class="btn btn-sm" style="background:#334155;color:#e0e8f0" data-action="load-game" title="载入存档">📂 读档</button>
    </div>
    <div id="hud-turn">2020 Q1</div>
  </div>
  <div id="main">
    <div id="map-container"></div>
    <div id="panel">
      <div class="panel-section">
        <div class="panel-title">快捷操作</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm" data-action="open-route-modal">开通航线</button>
          <button class="btn btn-primary btn-sm" data-action="open-buy-plane-modal">购买飞机</button>
          <button class="btn btn-warning btn-sm" data-action="open-fleet-panel">机队管理</button>
          <button class="btn btn-sm" style="background:#334155;color:#e0e8f0" data-action="open-route-list">航线管理</button>
          <button class="btn btn-sm" style="background:#b45309;color:#fff" data-action="open-loan-modal">银行贷款</button>
          <button class="btn btn-sm" style="background:#7c3aed;color:#fff" data-action="open-branch-modal">开设分部</button>
        </div>
      </div>
      <div class="panel-section" id="panel-info">
        <div class="panel-title">航线概览</div>
        <div id="route-summary"></div>
      </div>
      <div class="panel-section">
        <div class="panel-title">市场动态</div>
        <div id="market-info"></div>
      </div>
      <div class="panel-section" id="panel-route-create" style="display:none">
        <div class="panel-title">航线开通</div>
        <div id="route-create-info"></div>
      </div>
    </div>
  </div>
  <div id="bottom">
    <span id="season-badge"></span>
    <span id="oil-badge" style="padding:2px 10px;border-radius:10px;font-size:13px;font-weight:600;background:#33415580;color:#fbbf24"></span>
    <span id="reread-news-btn" style="display:none;padding:2px 10px;border-radius:10px;font-size:12px;font-weight:600;background:#1e3a5f80;color:#93c5fd;cursor:pointer" data-action="show-newspaper">📰 上季报纸</span>
    <span id="reread-report-btn" style="display:none;padding:2px 10px;border-radius:10px;font-size:12px;font-weight:600;background:#16a34a20;color:#4ade80;cursor:pointer" data-action="show-report">📊 上季财报</span>
    <span style="font-size:13px;color:#7ba3cc" id="bottom-hint" hidden></span>
    <div id="zoom-controls" style="display:flex;gap:2px;margin-left:auto;align-items:center">
      <span style="font-size:12px;color:#556;margin-right:4px">缩放</span>
      <button class="btn btn-sm" style="background:#2563eb;color:#fff;padding:2px 8px" data-action="set-map-zoom" data-zoom="1" id="zoom1">1x</button>
      <button class="btn btn-sm" style="background:#334155;color:#e0e8f0;padding:2px 8px" data-action="set-map-zoom" data-zoom="1.5" id="zoom15">1.5x</button>
      <button class="btn btn-sm" style="background:#334155;color:#e0e8f0;padding:2px 8px" data-action="set-map-zoom" data-zoom="2" id="zoom2">2x</button>
    </div>
    <button id="advance-btn" data-action="advance-turn" style="margin-left:10px">推进回合 ▶</button>
    <div id="bottom-tools">
      <button id="settings-btn" type="button" data-action="show-settings" title="设置">⚙</button>
      <button id="help-btn" type="button" data-action="show-onboarding-help" title="新手帮助">?</button>
    </div>
  </div>
</div>
<div id="event-banner"></div>
<div id="modal-root"></div>
<div id="delivery-root"></div>
<div id="onboard-hint">
  <div class="hint-title"></div><div class="hint-body"></div><div class="hint-step"></div>
  <div class="hint-actions">
    <button type="button" data-action="acknowledge-onboarding">知道了</button>
    <button type="button" data-action="dismiss-onboarding">不再提示</button>
  </div>
</div>
<div id="tutorial">
  <div class="tutorial-box" id="tutorial-step1">
    <h1>✈ 空豆霸业</h1>
    <p>欢迎来到航空霸业的世界！<br>选择一个时代剧本开始你的航空帝国之旅。</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:16px 0" id="era-select"></div>
    <p style="font-size:12px;color:#556;margin-top:12px">为你的航空公司命名：</p>
    <input type="text" id="company-name" value="豆豆航空" placeholder="输入公司名称" maxlength="20">
    <br>
    <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px;align-items:center">
      <button class="btn btn-success" data-action="tutorial-next-step" id="era-next-btn" style="padding:10px 40px;font-size:15px">开始游戏</button>
      <button class="btn" style="background:#7c3aed;color:#fff;padding:8px 20px;font-size:13px;font-weight:600;border-radius:6px" data-action="load-game">📂 读取存档</button>
    </div>
  </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
