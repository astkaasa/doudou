<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>空豆霸业</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div id="app">
  <div id="hud">
    <div id="hud-company" style="display:flex;align-items:center;gap:6px;margin-right:8px;padding-right:8px;border-right:1px solid #334155">
      <span style="font-size:16px">✈</span>
      <span id="hud-company-name" style="color:#fbbf24;font-weight:700;font-size:14px;white-space:nowrap">豆豆航空</span>
      <span id="hud-trait-badge" style="display:none"></span>
    </div>
    <span id="hud-cv-badge" style="display:none" onclick="openCompanyValueModal()" title="公司市值详情"></span>
    <div class="hud-item"><span class="hud-label">资金</span><span class="hud-val" id="hud-cash">$0M</span></div>
    <div class="hud-item"><span class="hud-label">上季利润</span><span class="hud-val" id="hud-profit">$0M</span></div>
    <div class="hud-item"><span class="hud-label">航线</span><span class="hud-val" id="hud-routes">0</span></div>
    <div class="hud-item" style="display:none"><span class="hud-label">机队</span><span class="hud-val" id="hud-fleet">购0/租0</span></div>
    <div class="hud-item"><span class="hud-label">客座率</span><span class="hud-val" id="hud-load">0%</span></div>
    <div class="hud-item"><span class="hud-label">运营效能</span><span class="hud-val" id="hud-ops-eff">--</span></div>
    <div id="hud-brand"><span class="hud-label">品牌</span><span class="hud-val" id="hud-brand-val">★</span></div>
    <div class="hud-item" style="cursor:pointer;padding:3px 12px;border-radius:12px;background:linear-gradient(90deg,#1e3a8a,#2563eb);font-size:13px;font-weight:700" id="hud-mainquest" onclick="openMainQuestPanel()" title="苍穹之路·主线任务"><span style="color:#fff">🛫 苍穹之路 🛬</span></div>
    <div class="hud-item" style="cursor:pointer" onclick="openMilestoneList()" title="查看里程碑"><span class="hud-label" style="color:#fbbf24">🏆里程碑</span></div>
    <div class="hud-item" id="hud-loan-wrap" style="display:none"><span class="hud-label">贷款</span><span class="hud-val negative" id="hud-loan">$0M</span></div>
    <div style="display:flex;gap:5px;margin-left:8px;align-items:center">
      <button class="btn btn-sm" style="background:#334155;color:#e0e8f0;border-radius:5px" onclick="saveGame()">💾 存档</button>
      <button class="btn btn-sm" style="background:#334155;color:#e0e8f0;border-radius:5px" onclick="loadGame()">📂 读档</button>
      <span style="width:1px;height:18px;background:#334155;margin:0 2px"></span>
      <button class="btn btn-sm" style="background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:5px;font-weight:600" onclick="backToMenu()">🏠 主菜单</button>
      <button class="btn btn-sm" style="background:#1e293b;color:#fbbf24;border:1px solid #334155;border-radius:5px;font-weight:600" onclick="openHelpPanel()" title="帮助与机制速查">❓</button>
    </div>
    <div id="hud-turn">2020 Q1</div>
  </div>
  <div id="main">
    <div id="map-container"></div>
    <div id="panel">
      <div class="panel-section">
        <div class="panel-title">快捷操作</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">
          <button class="btn btn-primary btn-sm" id="btn-buy-plane" onclick="openBuyPlaneModal()">购买飞机</button>
          <button class="btn btn-warning btn-sm" id="btn-fleet" onclick="openFleetPanel()">机队管理</button>
          <button class="btn btn-sm" id="btn-routes" style="background:#334155;color:#e0e8f0" onclick="openRouteList()">航线管理</button>
          <button class="btn btn-sm" id="btn-ops" style="background:#0891b2;color:#fff" onclick="openOperationsPanel()">运营管理</button>
          <button class="btn btn-sm" id="btn-branch" style="background:#7c3aed;color:#fff" onclick="openBranchModal()">分部管理</button>
          <button class="btn btn-sm" id="btn-loan" style="background:#b45309;color:#fff" onclick="openLoanModal()">银行贷款</button>
          <button class="btn btn-sm" id="btn-subsidiary" style="background:#90A4AE;color:#fff;font-weight:700" onclick="openSubsidiaryOverview()">投资管理</button>
        </div>
      </div>
      <div class="panel-section" id="panel-info">
        <div class="panel-title">航线概览</div>
        <div id="route-summary"></div>
      </div>
      <div class="panel-section">
        <div class="panel-title">市场动态</div>
        <div id="market-info"></div>
      </div>
      <div class="panel-section" id="panel-route-create" style="display:none">
        <div class="panel-title">航线开通</div>
        <div id="route-create-info"></div>
      </div>
    </div>
  </div>
  <div id="bottom">
    <span id="season-badge"></span>
    <span id="oil-badge" style="padding:2px 10px;border-radius:10px;font-size:13px;font-weight:600;background:#33415580;color:#fbbf24"></span>
    <span id="nasdou-badge" style="padding:2px 10px;border-radius:10px;font-size:13px;font-weight:600;background:#33415580;color:#fbbf24;cursor:pointer" onclick="openStockModal()">📈 NASDOU</span>
    <span id="mega-event-badge" style="display:none;padding:3px 12px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer" onclick="showNewspaper()">🏆 盛事</span>
    <span id="reread-news-btn" style="display:none;padding:2px 10px;border-radius:10px;font-size:12px;font-weight:600;background:#1e3a5f80;color:#93c5fd;cursor:pointer" onclick="showNewspaper()">📰 上季报纸</span>
    <span id="reread-report-btn" style="display:none;padding:2px 10px;border-radius:10px;font-size:12px;font-weight:600;background:#16a34a20;color:#4ade80;cursor:pointer" onclick="showReportAlone()">📊 上季财报</span>
    <span style="font-size:13px;color:#7ba3cc" id="bottom-hint">选择总部或分部作为起飞城市</span>
    <div style="display:flex;gap:2px;margin-left:auto;align-items:center">
      <span style="font-size:12px;color:#556;margin-right:4px">缩放</span>
      <button class="btn btn-sm" style="background:#2563eb;color:#fff;padding:2px 8px" onclick="setMapZoom(1)" id="zoom1">1x</button>
      <button class="btn btn-sm" style="background:#334155;color:#e0e8f0;padding:2px 8px" onclick="setMapZoom(1.5)" id="zoom15">1.5x</button>
      <button class="btn btn-sm" style="background:#334155;color:#e0e8f0;padding:2px 8px" onclick="setMapZoom(2)" id="zoom2">2x</button>
    </div>
    <button id="advance-btn" onclick="handleAdvance()" style="margin-left:10px">推进回合 ▶</button>
  </div>
</div>
<div id="event-banner"></div>
<div id="modal-root"></div>
<!-- 合同卡片区域 — 底栏右下角推进按钮上方 -->
<div id="contract-zone"></div>
<div id="delivery-root"></div>
<div id="city-drawer" class="city-drawer"></div>
<div id="onboard-hint"><button class="hint-close" onclick="dismissOnboardHint()">✕</button><div class="hint-title"></div><div class="hint-body"></div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px"><div class="hint-step">新手引导</div><a href="javascript:void(0)" class="hint-skip" onclick="skipOnboarding()">跳过引导</a></div></div>
<div id="tutorial">
  <!-- 地图背景 -->
  <div id="menu-map-bg"></div>
  <!-- 游戏标题 — 居中偏上，脱离绿框 -->
  <div class="menu-game-title" id="menu-game-title">
    空豆霸业
    <span class="title-sub">SKYLINE TYCOON</span>
  </div>
  <!-- 绿框内容区 -->
  <div class="tutorial-box" id="menu-box">
    <!-- 动态内容由 JS 渲染 -->
  </div>
</div>

<script src="data/icons.js"></script>
<script src="data/version.js"></script>
<script src="data/balance.js"></script>
<script src="data/subsidiary-data.js"></script>
<script src="data/mega-events.js"></script>
<script src="data/cities.js"></script>
<script src="data/planes.js"></script>
<script src="data/news-pool.js"></script>
<script src="data/constants.js"></script>
<script src="data/stocks.js"></script>
<script src="data/credits.js"></script>
<script src="data/city-era-data.js"></script>
<script src="data/milestones.js"></script>
<script src="data/main-quest.js"></script>
<script src="core/state.js"></script>
<script src="core/event-bus.js"></script>
<script src="core/utils.js"></script>
<script src="core/economics.js"></script>
<script src="core/fleet.js"></script>
<script src="core/routes.js"></script>
<script src="core/ai.js"></script>
<script src="core/events.js"></script>
<script src="core/stock.js"></script>
<script src="core/subsidiary.js"></script>
<script src="core/engine.js"></script>
<script src="core/milestone-engine.js"></script>
<script src="core/main-quest-engine.js"></script>
<script src="ui/modals.js"></script>
<script src="ui/map.js"></script>
<script src="ui/hud.js"></script>
<script src="ui/panel.js"></script>
<script src="ui/newspaper.js"></script>
<script src="ui/buy-plane.js"></script>
<script src="ui/fleet-panel.js"></script>
<script src="ui/route-panel.js"></script>
<script src="ui/report.js"></script>
<script src="ui/stock.js"></script>
<script src="ui/subsidiary.js"></script>
<script src="ui/branch.js"></script>

<script src="ui/contract-ui.js"></script>
<script src="ui/loan.js"></script>
<script src="ui/trait.js"></script>
<script src="ui/milestone-ui.js"></script>
<script src="ui/main-quest-ui.js"></script>
<script src="ui/angel-invest.js"></script>
<script src="ui/tutorial.js"></script>
<script>
// ===== INIT =====
initTutorial();
initMapDrag();
window.addEventListener('resize',()=>{if(G)renderMap();});
// Debug: press G to toggle lat/lon grid overlay
document.addEventListener('keydown',e=>{if(e.key==='g'||e.key==='G'){uiState.debugGrid=!uiState.debugGrid;if(G)renderMap();console.log('Debug grid:',uiState.debugGrid?'ON':'OFF');}});

// ===== EVENT BUS LISTENERS (core → UI) =====
on('fleet:changed', d => {
  updateHUD(); renderPanel();
  if(d.action==='buy') showBanner(`购买 ${d.count}架 ${d.planeName}`,'#2563eb');
  else if(d.action==='lease') showBanner(`租赁 ${d.count}架 ${d.planeName}，手续费 ${fmt(d.fee)}`,'#d97706');
  else if(d.action==='sell') showBanner(`出售 ${d.planeName}，获得 ${fmt(d.sellPrice)}`,'#d97706');
  else if(d.action==='returnLease') showBanner(`退租 ${d.planeName}`,'#d97706');
  if(d.action==='buy' || d.action==='lease') completeOnboardStep(0); // Step 1: 欢迎启航 完成
  updateMilestones();
});

on('turn:advanced', d => {
  applySeasonTheme(); updateHUD(); renderMap(); renderPanel();
  // v0.7.3: 每回合重置分支hint的关闭记忆，允许新回合再次提醒
  if(typeof resetBranchDismiss === 'function') resetBranchDismiss();
  // v0.7.3: "看懂财报"引导时，先更新hint让玩家看到提示文字，延迟400ms再弹财报
  // 原因：onboard-hint z-index=80 < modal-overlay z-index=100，但hint在该步骤时提升为110
  // 延迟让玩家有机会在财报弹出前读到hint提示"首季财报即将弹出"
  const isReportOnboard = G && G.turnsPlayed === 1 && !G._onboardReportShown && G.onboardStep <= 3 && G.onboardStep < 99;
  updateOnboarding();
  const showReport = () => {
    showTurnSummary(d.revenue, d.cost, d.profit, d.year, d.quarter);
    // 合同卡片由 closeTurnSummary() 中 spawnPendingContracts() 统一浮出
    updateAdvanceBtn();
    checkFTPs(); // FTP机制发现卡
    // 步骤追踪：首次推进完成Step 2
    if(G && G.turnsPlayed === 1) completeOnboardStep(2);
  };
  if(isReportOnboard){
    setTimeout(showReport, 400);
  } else {
    showReport();
  }
});

on('stock:changed', d => {
  updateHUD();
  updateNasdouBadge();
});

on('turn:warning', d => {
  showModal(`<h2>时代即将结束</h2><p style="color:#fbbf24;font-size:15px">当前剧本将于 ${d.endYear} 年结束，还剩最后1个季度！</p><p style="color:#94a3b8">请合理安排最后的运营策略。</p><button class="btn btn-primary" onclick="closeModal()" style="margin-top:16px;padding:8px 32px">知道了</button>`);
});

on('game:over', d => {
  if(d.reason==='bankrupt'){
    $('modal-root').innerHTML=`<div class="modal-overlay"><div class="modal gameover"><h1>破产了</h1><p>你的航空公司因资金耗尽而倒闭。</p><p>存活了 ${d.turnsPlayed} 个季度</p><p>最高曾拥有 ${d.routes} 条航线、${d.fleet} 架飞机</p><button class="btn btn-primary" onclick="location.reload()" style="margin-top:16px;padding:10px 32px">重新开始</button></div></div>`;
  } else if(d.reason==='era_end'){
    $('modal-root').innerHTML=`<div class="modal-overlay"><div class="modal gameover"><h1>时代落幕</h1><p style="color:#fbbf24;font-size:15px">${d.eraName} 已结束</p><p>存活了 ${d.turnsPlayed} 个季度</p><p>最终资金：${fmt(d.cash)}</p><p>累计利润：${fmt(d.totalProfit)}</p><p>拥有 ${d.routes} 条航线、${d.fleet} 架飞机</p><button class="btn btn-primary" onclick="location.reload()" style="margin-top:16px;padding:10px 32px">重新开始</button></div></div>`;
  }
});

on('game:angel', d => {
  showAngelInvest();
});

// ── 主线任务事件 ──
on('mainquest:stage_complete', d => {
  showMainQuestStageNotify(d);
});

on('mainquest:victory', d => {
  showVictoryCeremony(d);
});
</script>
</body>
</html>
