<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>空豆霸业</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div id="app">
  <div id="hud">
    <div id="hud-company" style="display:flex;align-items:center;gap:6px;margin-right:8px;padding-right:8px;border-right:1px solid #334155">
      <span style="font-size:16px">✈</span>
      <span id="hud-company-name" style="color:#fbbf24;font-weight:700;font-size:14px;white-space:nowrap">豆豆航空</span>
      <span id="hud-trait-badge" style="display:none"></span>
    </div>
    <div class="hud-item"><span class="hud-label">资金</span><span class="hud-val" id="hud-cash">$0M</span></div>
    <div class="hud-item"><span class="hud-label">上季利润</span><span class="hud-val" id="hud-profit">$0M</span></div>
    <div class="hud-item"><span class="hud-label">航线</span><span class="hud-val" id="hud-routes">0</span></div>
    <div class="hud-item"><span class="hud-label">机队</span><span class="hud-val" id="hud-fleet">购0/租0</span></div>
    <div class="hud-item"><span class="hud-label">客座率</span><span class="hud-val" id="hud-load">0%</span></div>
    <div id="hud-brand"><span class="hud-label">品牌</span><span class="hud-val" id="hud-brand-val">★</span></div>
    <div class="hud-item" id="hud-loan-wrap" style="display:none"><span class="hud-label">贷款</span><span class="hud-val negative" id="hud-loan">$0M</span></div>
    <div style="display:flex;gap:5px;margin-left:8px;align-items:center">
      <button class="btn btn-sm" style="background:#334155;color:#e0e8f0;border-radius:5px" onclick="saveGame()">💾 存档</button>
      <button class="btn btn-sm" style="background:#334155;color:#e0e8f0;border-radius:5px" onclick="loadGame()">📂 读档</button>
      <span style="width:1px;height:18px;background:#334155;margin:0 2px"></span>
      <button class="btn btn-sm" style="background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:5px;font-weight:600" onclick="backToMenu()">🏠 主菜单</button>
    </div>
    <div id="hud-turn">2020 Q1</div>
  </div>
  <div id="main">
    <div id="map-container"></div>
    <div id="panel">
      <div class="panel-section">
        <div class="panel-title">快捷操作</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm" onclick="openBuyPlaneModal()">购买飞机</button>
          <button class="btn btn-warning btn-sm" onclick="openFleetPanel()">机队管理</button>
          <button class="btn btn-sm" style="background:#334155;color:#e0e8f0" onclick="openRouteList()">航线管理</button>
          <button class="btn btn-sm" style="background:#b45309;color:#fff" onclick="openLoanModal()">银行贷款</button>
          <button class="btn btn-sm" style="background:#7c3aed;color:#fff" onclick="openBranchModal()">开设分部</button>
        </div>
      </div>
      <div class="panel-section" id="panel-info">
        <div class="panel-title">航线概览</div>
        <div id="route-summary"></div>
      </div>
      <div class="panel-section">
        <div class="panel-title">市场动态</div>
        <div id="market-info"></div>
      </div>
      <div class="panel-section" id="panel-route-create" style="display:none">
        <div class="panel-title">航线开通</div>
        <div id="route-create-info"></div>
      </div>
    </div>
  </div>
  <div id="bottom">
    <span id="season-badge"></span>
    <span id="oil-badge" style="padding:2px 10px;border-radius:10px;font-size:13px;font-weight:600;background:#33415580;color:#fbbf24"></span>
    <span id="reread-news-btn" style="display:none;padding:2px 10px;border-radius:10px;font-size:12px;font-weight:600;background:#1e3a5f80;color:#93c5fd;cursor:pointer" onclick="showNewspaper()">📰 上季报纸</span>
    <span id="reread-report-btn" style="display:none;padding:2px 10px;border-radius:10px;font-size:12px;font-weight:600;background:#16a34a20;color:#4ade80;cursor:pointer" onclick="showReportAlone()">📊 上季财报</span>
    <span style="font-size:13px;color:#7ba3cc" id="bottom-hint">选择总部或分部作为起飞城市</span>
    <div style="display:flex;gap:2px;margin-left:auto;align-items:center">
      <span style="font-size:12px;color:#556;margin-right:4px">缩放</span>
      <button class="btn btn-sm" style="background:#2563eb;color:#fff;padding:2px 8px" onclick="setMapZoom(1)" id="zoom1">1x</button>
      <button class="btn btn-sm" style="background:#334155;color:#e0e8f0;padding:2px 8px" onclick="setMapZoom(1.5)" id="zoom15">1.5x</button>
      <button class="btn btn-sm" style="background:#334155;color:#e0e8f0;padding:2px 8px" onclick="setMapZoom(2)" id="zoom2">2x</button>
    </div>
    <button id="advance-btn" onclick="advanceTurn()" style="margin-left:10px">推进回合 ▶</button>
  </div>
</div>
<div id="event-banner"></div>
<div id="modal-root"></div>
<div id="delivery-root"></div>
<div id="onboard-hint"><div class="hint-title"></div><div class="hint-body"></div><div class="hint-step"></div></div>
<div id="tutorial">
  <div class="tutorial-box" id="tutorial-step1">
    <h1>✈ 空豆霸业</h1>
    <p>欢迎来到航空霸业的世界！<br>选择一个时代剧本开始你的航空帝国之旅。</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:16px 0" id="era-select"></div>
    <p style="font-size:12px;color:#556;margin-top:12px">为你的航空公司命名：</p>
    <input type="text" id="company-name" value="豆豆航空" placeholder="输入公司名称" maxlength="20">
    <br>
    <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px;align-items:center">
      <button class="btn" onclick="tutorialNextStep()" id="era-next-btn" style="padding:12px 56px;font-size:16px;font-weight:700;border-radius:8px;background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(34,197,94,0.3);transition:all 0.2s;letter-spacing:1px">开始游戏</button>
      <button class="btn" style="background:#7c3aed;color:#fff;padding:8px 20px;font-size:13px;font-weight:600;border-radius:6px" onclick="loadGameFromTutorial()">📂 读取存档</button>
    </div>
  </div>
</div>

<script src="data/constants.js"></script>
<script src="core/state.js"></script>
<script src="core/utils.js"></script>
<script src="core/economics.js"></script>
<script src="core/fleet.js"></script>
<script src="core/routes.js"></script>
<script src="core/ai.js"></script>
<script src="core/events.js"></script>
<script src="core/engine.js"></script>
<script src="ui/modals.js"></script>
<script src="ui/map.js"></script>
<script src="ui/hud.js"></script>
<script src="ui/panel.js"></script>
<script src="ui/newspaper.js"></script>
<script src="ui/buy-plane.js"></script>
<script src="ui/fleet-panel.js"></script>
<script src="ui/route-panel.js"></script>
<script src="ui/report.js"></script>
<script src="ui/branch.js"></script>
<script src="ui/loan.js"></script>
<script src="ui/trait.js"></script>
<script src="ui/tutorial.js"></script>
<script>
// ===== INIT =====
initTutorial();
initMapDrag();
window.addEventListener('resize',()=>{if(G)renderMap();});
// Debug: press G to toggle lat/lon grid overlay
document.addEventListener('keydown',e=>{if(e.key==='g'||e.key==='G'){_debugGrid=!_debugGrid;if(G)renderMap();console.log('Debug grid:',_debugGrid?'ON':'OFF');}});
</script>
</body>
</html>
