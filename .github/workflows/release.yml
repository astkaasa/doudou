name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm run security:audit

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify release
        run: npm run release:verify

      - name: Verify tag version
        if: startsWith(github.ref, 'refs/tags/')
        run: node scripts/verify-release.mjs --tag "$GITHUB_REF_NAME"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: doudou-airline-release
          path: |
            dist/standalone.html
            dist/release-manifest.json
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/standalone.html dist/release-manifest.json --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/standalone.html dist/release-manifest.json --verify-tag --generate-notes --title "Doudou Airline $GITHUB_REF_NAME"
          fi
